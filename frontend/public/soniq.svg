<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#9FE1CB"/>
    </linearGradient>
    <linearGradient id="play4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E1F5EE"/>
      <stop offset="100%" stop-color="#9FE1CB"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#04342C"/>
  <!-- Outer pulse ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.35"/>
  <!-- Inner pulse ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#1D9E75" stroke-width="2" opacity="0.6"/>
  <!-- Inner fill -->
  <circle cx="50" cy="50" r="22" fill="url(#bg4)" opacity="0.9"/>
  <!-- Play triangle -->
  <polygon points="44,40 44,60 62,50" fill="#04342C"/>
</svg>
